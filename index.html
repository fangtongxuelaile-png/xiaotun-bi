<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小豚当家销售经营BI看板 V1.0</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg2:#1a1a2e;--card:#1e1e30;--gold:#D4AF37;--gold-d:rgba(212,175,55,0.15);--gold-b:rgba(212,175,55,0.3);--txt:#f0f0f0;--txt2:rgba(255,255,255,0.6);--txt3:rgba(255,255,255,0.35);--green:#30D158;--red:#FF453A;--blue:#4FC3F7;--border:rgba(255,255,255,0.06)}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:13px;overflow-x:hidden}
/* Header */
.app-header{display:flex;align-items:center;gap:12px;padding:10px 20px;background:linear-gradient(135deg,#0d0d1a,#1a1a2e);border-bottom:1px solid var(--gold-b);position:sticky;top:0;z-index:100}
.logo-icon{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#D4AF37,#B8941F);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#0a0a0a}
.app-title{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px}
.app-sub{font-size:11px;color:var(--txt3)}
/* Filter Bar */
.filter-bar{display:flex;align-items:center;gap:12px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:59px;z-index:99}
.filter-group{display:flex;align-items:center;gap:4px}
.filter-group label{font-size:11px;color:var(--txt2);white-space:nowrap}
.filter-group input[type=date]{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:4px;font-size:12px;color-scheme:dark}
.btn-apply{background:var(--gold);color:#0a0a0a;border:none;padding:5px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-apply:hover{opacity:0.85}
/* Multi-select */
.ms-container{position:relative}
.ms-btn{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);color:var(--txt);padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer;white-space:nowrap}
.ms-btn:hover{border-color:var(--gold-b)}
.ms-val{color:var(--gold);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-arrow{font-size:9px;color:var(--txt3)}
.ms-panel{position:absolute;top:100%;left:0;margin-top:4px;background:var(--card);border:1px solid var(--gold-b);border-radius:6px;padding:6px;min-width:180px;max-height:280px;overflow-y:auto;z-index:200;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.ms-panel.show{display:block}
.ms-actions{display:flex;gap:4px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.ms-actions button{background:var(--gold-d);border:1px solid var(--border);color:var(--gold);padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer}
.ms-item{display:flex;align-items:center;gap:6px;padding:3px 4px;cursor:pointer;font-size:12px;color:var(--txt2)}
.ms-item:hover{color:var(--txt)}
.ms-item input{accent-color:var(--gold)}
/* Tab Bar */
.tab-bar{display:flex;gap:0;padding:0 20px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:95px;z-index:98}
.tab-btn{background:none;border:none;color:var(--txt2);padding:10px 18px;font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn:hover{color:var(--txt)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
/* Tab Content */
.tab-content{padding:16px 20px 40px;min-height:600px}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:border .2s;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
.kpi-card:hover{border-color:var(--gold-b)}
.kpi-label{font-size:11px;color:var(--txt2);margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.kpi-unit{font-size:11px;color:var(--txt2);font-weight:400;margin-left:2px}
.kpi-compare{display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--txt3)}
.kpi-compare span span{font-weight:600}
.chg-pos{color:var(--green)!important}
.chg-neg{color:var(--red)!important}
.chg-na{color:var(--txt3)!important}
/* Chart Cards */
.chart-grid{display:grid;gap:12px;margin-top:12px}
.cg-2{grid-template-columns:1fr 1fr}
.cg-3{grid-template-columns:1fr 1fr 1fr}
.cg-1{grid-template-columns:1fr}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;overflow:hidden}
.chart-card-title{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.chart-card-title .ctrl{display:flex;gap:4px}
.chart-card-title .ctrl button{background:var(--gold-d);border:1px solid var(--border);color:var(--txt2);padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer}
.chart-card-title .ctrl button.active{background:var(--gold);color:#0a0a0a}
/* Tables */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--gold-d);color:var(--gold);padding:7px 10px;text-align:left;border-bottom:1px solid var(--gold-b);font-weight:600;white-space:nowrap}
.data-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--txt)}
.data-table tr:nth-child(even) td{background:rgba(255,255,255,0.015)}
.data-table tr:hover td{background:rgba(212,175,55,0.06)}
.data-table .total-row td{font-weight:700;color:var(--gold);border-top:1px solid var(--gold-b)}
.data-table .pos{color:var(--green)}
.data-table .neg{color:var(--red)}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Section */
.section{margin-bottom:16px}
.section-title{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:8px;padding-left:8px;border-left:3px solid var(--gold)}
/* Loading */
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Selectors */
.sel-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.sel-row label{font-size:12px;color:var(--txt2)}
.sel-row select,.sel-row input{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:4px;font-size:12px;color-scheme:dark}
.sel-row select option{background:var(--card)}
/* Gauge */
.gauge-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
/* Progress bar */
.prog-bar{width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
/* Action list */
.action-item{display:flex;align-items:start;gap:8px;padding:8px 10px;background:var(--card);border-radius:6px;margin-bottom:6px;border-left:3px solid}
.action-p0{border-left-color:var(--red)}
.action-p1{border-left-color:var(--gold)}
.action-p2{border-left-color:var(--blue)}
.action-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;white-space:nowrap}
.tag-p0{background:rgba(255,69,58,0.2);color:var(--red)}
.tag-p1{background:var(--gold-d);color:var(--gold)}
.tag-p2{background:rgba(79,195,247,0.15);color:var(--blue)}
.action-text{font-size:12px;color:var(--txt2);flex:1}
/* GAP */
.gap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gap-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.gap-card h4{color:var(--gold);font-size:13px;margin-bottom:8px}
.gap-metric{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.gap-metric span:first-child{color:var(--txt2)}
.gap-metric span:last-child{font-weight:600}
/* Responsive */
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}.cg-2,.cg-3,.gauge-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.cg-2,.cg-3,.gauge-grid,.gap-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="spinner"></div>
<div style="color:var(--gold);font-size:14px">正在加载数据...</div>
</div>

<div id="app" style="display:none">
<header class="app-header">
<div class="logo-icon">豚</div>
<div>
<div class="app-title">小豚当家销售经营BI看板</div>
<div class="app-sub">V1.0 · 数据周期: <span id="dataRange"></span></div>
</div>
</header>

<div class="filter-bar" id="filterBar"></div>

<nav class="tab-bar" id="tabBar">
<button class="tab-btn active" onclick="switchTab(0)">经营总览</button>
<button class="tab-btn" onclick="switchTab(1)">推广分析</button>
<button class="tab-btn" onclick="switchTab(2)">时间段对比</button>
<button class="tab-btn" onclick="switchTab(3)">趋势分析</button>
<button class="tab-btn" onclick="switchTab(4)">智能诊断</button>
<button class="tab-btn" onclick="switchTab(5)">透视表分析</button>
<button class="tab-btn" onclick="switchTab(6)">目标达成</button>
</nav>

<main class="tab-content" id="tabContent">
<div id="tab0" class="tab-panel active"></div>
<div id="tab1" class="tab-panel"></div>
<div id="tab2" class="tab-panel"></div>
<div id="tab3" class="tab-panel"></div>
<div id="tab4" class="tab-panel"></div>
<div id="tab5" class="tab-panel"></div>
<div id="tab6" class="tab-panel"></div>
</main>
</div>

<script>
// ==================== CONSTANTS ====================
const COLORS=['#D4AF37','#4FC3F7','#66BB6A','#FF7043','#AB47BC','#26C6DA','#FFA726','#EF5350','#7E57C2','#26A69A','#EC407A','#789262'];
const SC={date:0,ch:1,st:2,cat:3,mdl:4,vis:5,vw:6,ac:7,aci:8,byr:9,itm:10,amt:11,rfd:12};
const PC={date:0,ch:1,st:2,cat:3,mdl:4,scn:5,cost:6,imp:7,clk:8,tot:9,dir:10,ind:11,ord:12,cart:13};
const LAYOUT={
paper_bgcolor:'transparent',plot_bgcolor:'rgba(255,255,255,0.015)',
font:{color:'rgba(255,255,255,0.65)',size:10,family:'-apple-system,system-ui,sans-serif'},
margin:{l:50,r:20,t:10,b:30},
xaxis:{gridcolor:'rgba(255,255,255,0.04)',zerolinecolor:'rgba(255,255,255,0.08)',linecolor:'rgba(255,255,255,0.1)',tickfont:{size:9}},
yaxis:{gridcolor:'rgba(255,255,255,0.04)',zerolinecolor:'rgba(255,255,255,0.08)',linecolor:'rgba(255,255,255,0.1)',tickfont:{size:9}},
legend:{bgcolor:'transparent',orientation:'h',y:-0.22,font:{size:9,color:'rgba(255,255,255,0.6)'}},
hovermode:'x unified',
hoverlabel:{bgcolor:'#1e1e30',bordercolor:'#D4AF37',font:{color:'#f0f0f0',size:11}},
bargap:0.2
};
const CONFIG={responsive:true,displayModeBar:false};
const VALID_IND=new Set(['支付件数目标','成交金额目标','目标费率','目标投入金额','实际推广花费','实际投入金额','实际费率','实际支付件数','推广花费','成交金额达成','目标推广费','实际成交金额','成交金额达成率']);

// ==================== STATE ====================
let D=null;
let S={
filters:{startDate:'',endDate:'',channels:new Set(),stores:new Set(),categories:new Set(),models:new Set()},
activeTab:0,
tab0:{gran:'day'},
tab2:{mode:'mom'},
tab3:{dim:'date',cmp:'yoy',gran:'day'},
tab5:{sRow:'store',sMetric:'amount',pRow:'store',pMetric:'cost',topN:15}
};

// ==================== DATA LAYER ====================
async function loadData(){
const resp=await fetch('./data.json');
D=await resp.json();
}
function chName(i){return D.meta.channels[i]||'-'}
function stName(i){return D.meta.stores[i]||'-'}
function catName(i){return D.meta.categories[i]||'-'}
function mdlName(i){return D.meta.models[i]||'-'}
function scnName(i){return D.meta.marketingScenes[i]||'-'}
function dimName(dim,i){
return{channel:chName,store:stName,category:catName,model:mdlName,marketingScene:scnName}[dim](i);
}

// ==================== FILTERING ====================
function inRange(d,s,e){return d>=s&&d<=e}
function inSet(i,set){return!set||set.size===0||set.has(i)}
function fSales(rows,f){
return rows.filter(r=>inRange(r[SC.date],f.startDate,f.endDate)&&inSet(r[SC.ch],f.channels)&&inSet(r[SC.st],f.stores)&&inSet(r[SC.cat],f.categories)&&inSet(r[SC.mdl],f.models));
}
function fPromo(rows,f){
return rows.filter(r=>inRange(r[PC.date],f.startDate,f.endDate)&&inSet(r[PC.ch],f.channels)&&inSet(r[PC.st],f.stores)&&inSet(r[PC.cat],f.categories)&&inSet(r[PC.mdl],f.models));
}
function getSalesRows(f){return fSales(D.sales.rows,f)}
function getPromoRows(f){return fPromo(D.promo.rows,f)}

// ==================== AGGREGATION ====================
function aggSales(rows){
const a={visitors:0,views:0,addCart:0,addCartItems:0,buyers:0,items:0,amount:0,refund:0};
for(const r of rows){a.visitors+=r[SC.vis];a.views+=r[SC.vw];a.addCart+=r[SC.ac];a.addCartItems+=r[SC.aci];a.buyers+=r[SC.byr];a.items+=r[SC.itm];a.amount+=r[SC.amt];a.refund+=r[SC.rfd]}
return a;
}
function aggPromo(rows){
const a={cost:0,impressions:0,clicks:0,totalAmount:0,directAmount:0,indirectAmount:0,totalOrders:0,totalCart:0};
for(const r of rows){a.cost+=r[PC.cost];a.impressions+=r[PC.imp];a.clicks+=r[PC.clk];a.totalAmount+=r[PC.tot];a.directAmount+=r[PC.dir];a.indirectAmount+=r[PC.ind];a.totalOrders+=r[PC.ord];a.totalCart+=r[PC.cart]}
return a;
}
function calcSK(a){
return{
amount:a.amount,items:a.items,buyers:a.buyers,visitors:a.visitors,
convRate:a.visitors>0?a.buyers/a.visitors*100:0,
avgPrice:a.buyers>0?a.amount/a.buyers:0,
addCartRate:a.visitors>0?a.addCart/a.visitors*100:0,
refund:a.refund,refundRate:a.amount>0?a.refund/a.amount*100:0,
views:a.views,addCart:a.addCart
};
}
function calcPK(p,s){
return{
cost:p.cost,roi:p.cost>0?p.totalAmount/p.cost:0,
ctr:p.impressions>0?p.clicks/p.impressions*100:0,
cpc:p.clicks>0?p.cost/p.clicks:0,
totalAmount:p.totalAmount,directAmount:p.directAmount,
directROI:p.cost>0?p.directAmount/p.cost:0,
promoConvRate:p.clicks>0?p.totalOrders/p.clicks*100:0,
promoRatio:s.amount>0?p.directAmount/s.amount*100:0,
feeRate:s.amount>0?p.cost/s.amount*100:0,
impressions:p.impressions,clicks:p.clicks,totalOrders:p.totalOrders,totalCart:p.totalCart
};
}
function getKPIs(startDate,endDate){
const f={...S.filters,startDate,endDate};
const sRows=getSalesRows(f);const pRows=getPromoRows(f);
const sAgg=aggSales(sRows);const pAgg=aggPromo(pRows);
return{...calcSK(sAgg),...calcPK(pAgg,sAgg)};
}

// ==================== COMPARISON ====================
function fmtDate(d){return d.toISOString().split('T')[0]}
function getMoMDates(){
const s=new Date(S.filters.startDate),e=new Date(S.filters.endDate);
const days=Math.floor((e-s)/86400000)+1;
const pe=new Date(s.getTime()-86400000);
const ps=new Date(pe.getTime()-(days-1)*86400000);
return{start:fmtDate(ps),end:fmtDate(pe)};
}
function getYoYDates(){
const s=new Date(S.filters.startDate),e=new Date(S.filters.endDate);
const ps=new Date(s);ps.setFullYear(ps.getFullYear()-1);
const pe=new Date(e);pe.setFullYear(pe.getFullYear()-1);
return{start:fmtDate(ps),end:fmtDate(pe)};
}
function chgPct(c,p){if(p==null||p===0||!isFinite(p))return null;return(c-p)/Math.abs(p)*100}

// ==================== GROUPING ====================
function weekKey(ds){
const d=new Date(ds);const day=d.getDay()||7;
const m=new Date(d);m.setDate(d.getDate()-day+1);
return fmtDate(m);
}
function monthKey(ds){return ds.substring(0,7)}
function groupBy(rows,keyFn){
const m=new Map();
for(const r of rows){const k=keyFn(r);if(!m.has(k))m.set(k,[]);m.get(k).push(r)}
return m;
}
function groupSalesByDate(rows,gran){
const kf=gran==='day'?r=>r[SC.date]:gran==='week'?r=>weekKey(r[SC.date]):r=>monthKey(r[SC.date]);
const m=groupBy(rows,kf);
return[...m.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}
function groupSalesByDim(rows,dim){
const idx={channel:SC.ch,store:SC.st,category:SC.cat,model:SC.mdl}[dim];
const m=groupBy(rows,r=>r[idx]);
const result=[...m.entries()].map(([k,v])=>[dimName(dim,k),v]);
return result;
}
function groupPromoByDate(rows,gran){
const kf=gran==='day'?r=>r[PC.date]:gran==='week'?r=>weekKey(r[PC.date]):r=>monthKey(r[PC.date]);
const m=groupBy(rows,kf);
return[...m.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
}
function groupPromoByDim(rows,dim){
const idx={channel:PC.ch,store:PC.st,category:PC.cat,model:PC.mdl,marketingScene:PC.scn}[dim];
const m=groupBy(rows,r=>r[idx]);
const result=[...m.entries()].map(([k,v])=>[dimName(dim,k),v]);
return result;
}

// ==================== FORMATTING ====================
function fmt(v,type){
if(v==null||isNaN(v))return'N/A';
switch(type){
case'wan':return(v/10000).toFixed(1);
case'num':return Math.round(v).toLocaleString();
case'pct':return v.toFixed(1);
case'dec':return v.toFixed(2);
case'money':return Math.round(v).toLocaleString();
case'int':return Math.round(v).toString();
default:return String(v);
}
}
function fmtChg(c,inv){
if(c==null)return'<span class="chg-na">N/A</span>';
const pos=c>=0;const good=inv?!pos:pos;
const color=good?'var(--green)':'var(--red)';
const arrow=pos?'▲':'▼';
return`<span style="color:${color}">${arrow}${Math.abs(c).toFixed(1)}%</span>`;
}

// ==================== HTML HELPERS ====================
function kpiCard(label,val,unit,mom,yoy,inv){
return`<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value">${val}<span class="kpi-unit">${unit}</span></div><div class="kpi-compare"><span>环比 ${fmtChg(mom,inv)}</span><span>同比 ${fmtChg(yoy,inv)}</span></div></div>`;
}
function chartCard(id,title,ctrl){
return`<div class="chart-card"><div class="chart-card-title">${title}${ctrl||''}</div><div id="${id}" style="height:300px"></div></div>`;
}
function plot(id,traces,layout){
const el=document.getElementById(id);
if(!el)return;
Plotly.react(id,traces,{...LAYOUT,...(layout||{})},CONFIG);
}
function tableHTML(headers,rows,opts){
opts=opts||{};
let h='<table class="data-table"><thead><tr>'+headers.map(x=>`<th style="text-align:${x.align||'left'}">${x.text}</th>`).join('')+'</tr></thead><tbody>';
for(const r of rows){
if(r._total)h+=`<tr class="total-row">`;else h+=`<tr>`;
h+=r.map((c,i)=>`<td style="text-align:${headers[i].align||'left'}">${c}</td>`).join('')+'</tr>';
}
h+='</tbody></table>';
return h;
}
function section(title,content){
return`<div class="section"><div class="section-title">${title}</div>${content}</div>`;
}

// ==================== KPI CONFIGS ====================
const TAB0_KPIS=[
[{l:'支付金额',k:'amount',u:'万',f:'wan'},{l:'支付件数',k:'items',u:'',f:'num'},{l:'支付买家',k:'buyers',u:'',f:'num'},{l:'访客数',k:'visitors',u:'',f:'num'},{l:'转化率',k:'convRate',u:'%',f:'pct'}],

function initMS(dim,label){

c.innerHTML=`<button class="ms-btn" onclick="event.stopPropagation();toggleMS('${dim}')"><span>${label}:</span><span class="ms-val" id="msv-${dim}">全部</span><span class="ms-arrow">▾</span></button>

${items.map((it,i)=>`<label class="ms-item"><input type="checkbox" value="${i}" checked data-dim="${dim}"><span>${it}</span></label>`).join('')}
</div>`;
}
function toggleMS(dim){
document.querySelectorAll('.ms-panel').forEach(p=>{if(p.id!=='msp-'+dim)p.classList.remove('show')});
const p=document.getElementById('msp-'+dim);
p.classList.toggle('show');
updateMSVal(dim);
}
function selectAllMS(dim,all){
document.querySelectorAll(`#msp-${dim} input`).forEach(cb=>cb.checked=all);
updateMSVal(dim);
}
function updateMSVal(dim){
const cbs=document.querySelectorAll(`#msp-${dim} input`);
const checked=[...cbs].filter(c=>c.checked);
const val=checked.length===cbs.length?'全部':checked.length===0?'无':`${checked.length}/${cbs.length}`;
document.getElementById('msv-'+dim).textContent=val;
}
function getSelectedSet(dim){
const cbs=document.querySelectorAll(`#msp-${dim} input:checked`);
return new Set([...cbs].map(c=>parseInt(c.value)));
}
function applyFilters(){
S.filters.startDate=document.getElementById('fStart').value;

}

// ==================== TAB 4: 智能诊断 ====================
function renderTab4(){
const curr=getKPIs(S.filters.startDate,S.filters.endDate);
const md=getMoMDates(),yd=getYoYDates();
const mom=getKPIs(md.start,md.end),yoy=getKPIs(yd.start,yd.end);
const sRows=getSalesRows(S.filters);

// GAP1: Target vs Actual (use targets data for 2026-07)
let gap1HTML='';
if(D.targetsParsed&&D.targetsParsed['2026-07']){
const t=D.targetsParsed['2026-07'];
let tAmt=0,aAmt=0,tItm=0,aItm=0;
for(const store in t){
for(const model in t[store]){
const ind=t[store][model];
if(ind['成交金额目标'])tAmt+=ind['成交金额目标'];
if(ind['实际成交金额'])aAmt+=ind['实际成交金额'];
if(ind['支付件数目标'])tItm+=ind['支付件数目标'];
if(ind['实际支付件数'])aItm+=ind['实际支付件数'];
}
}
const amtRate=tAmt>0?aAmt/tAmt*100:0;
const itmRate=tItm>0?aItm/tItm*100:0;
gap1HTML=`
<div class="gap-metric"><span>成交金额目标</span><span>${fmt(tAmt,'money')}元</span></div>
<div class="gap-metric"><span>实际成交金额</span><span>${fmt(aAmt,'money')}元</span></div>
<div class="gap-metric"><span>达成率</span><span style="color:${amtRate>=100?'var(--green)':'var(--red)'}">${amtRate.toFixed(1)}%</span></div>
<div class="gap-metric"><span>支付件数目标</span><span>${fmt(tItm,'num')}</span></div>
<div class="gap-metric"><span>实际支付件数</span><span>${fmt(aItm,'num')}</span></div>
<div class="gap-metric"><span>件数达成率</span><span style="color:${itmRate>=100?'var(--green)':'var(--red)'}">${itmRate.toFixed(1)}%</span></div>`;
}else{
gap1HTML='<div style="color:var(--txt3);font-size:12px">无目标数据</div>';
}

// GAP2: YoY
const gap2Metrics=[['支付金额','amount','wan'],['支付件数','items','num'],['访客数','visitors','num'],['转化率','convRate','pct'],['ROI','roi','dec']];
const gap2HTML=gap2Metrics.map(([l,k,f])=>{
const c=chgPct(curr[k],yoy[k]);
return`<div class="gap-metric"><span>${l}</span><span>${fmtChg(c)}</span></div>`;
}).join('');

// GAP3: MoM
const gap3HTML=gap2Metrics.map(([l,k,f])=>{
const c=chgPct(curr[k],mom[k]);
return`<div class="gap-metric"><span>${l}</span><span>${fmtChg(c)}</span></div>`;
}).join('');

// Health scores
function score(val,benchmark,inv){
if(val==null)return 50;
if(inv){
if(val<=benchmark*0.5)return 100;
if(val>=benchmark*2)return 0;
return Math.round(100*(benchmark*2-val)/(benchmark*1.5));
}
if(val>=benchmark)return 100;
if(val<=0)return 0;
return Math.round(100*val/benchmark);
}
const gmvScore=score(chgPct(curr.amount,yoy.amount),0,true); // growth-based
const visScore=score(chgPct(curr.visitors,yoy.visitors),0,true);
const convScore=score(curr.convRate,3);
const priceScore=score(curr.avgPrice,200);
const refundScore=score(curr.refundRate,5,true);
const scores=[{l:'GMV',v:Math.max(0,Math.min(100,50+gmvScore))},{l:'流量',v:Math.max(0,Math.min(100,50+visScore))},{l:'转化率',v:convScore},{l:'客单价',v:priceScore},{l:'退款率',v:refundScore}];

// Shapley decomposition (MoM)
const V0=mom.visitors,V1=curr.visitors;
const C0=mom.visitors>0?mom.buyers/mom.visitors:0,C1=curr.visitors>0?curr.buyers/curr.visitors:0;
const P0=mom.buyers>0?mom.amount/mom.buyers:0,P1=curr.buyers>0?curr.amount/curr.buyers:0;
const GMV0=V0*C0*P0,GMV1=V1*C1*P1;
const trafficEffect=(V1-V0)*C0*P0;
const convEffect=V1*(C1-C0)*P0;
const priceEffect=V1*C1*(P1-P0);

let html=section('三GAP框架',`<div class="gap-grid">
<div class="gap-card"><h4>GAP1: 目标 vs 实际</h4>${gap1HTML}</div>
<div class="gap-card"><h4>GAP2: 今年 vs 去年(同比)</h4>${gap2HTML}</div>
<div class="gap-card"><h4>GAP3: 本期 vs 上期(环比)</h4>${gap3HTML}</div>
</div>`);

html+=section('健康评分仪表盘',`<div class="gauge-grid" id="t4-gauges"></div>`);
html+=section('Shapley归因(GMV环比变化分解)',`<div id="t4-shapley" style="height:350px"></div>`);
html+=section('人货场分析',`<div class="chart-grid cg-3">${chartCard('t4-traffic','流量健康度')}${chartCard('t4-product','品类型号分析')}${chartCard('t4-channel','渠道效率分析')}</div>`);
html+=section('执行清单(P0优先行动)',`<div id="t4-actions"></div>`);

document.getElementById('tab4').innerHTML=html;

// Gauges
const gaugeHTML=scores.map(s=>`<div class="chart-card"><div class="chart-card-title">${s.l}评分</div><div id="gauge-${s.l}" style="height:200px"></div></div>`).join('');
document.getElementById('t4-gauges').innerHTML=gaugeHTML;
scores.forEach(s=>{
const color=s.v>=70?'#30D158':s.v>=40?'#D4AF37':'#FF453A';
plot('gauge-'+s.l,[{
type:'indicator',mode:'gauge+number',value:s.v,
gauge:{axis:{range:[0,100],tickcolor:'rgba(255,255,255,0.4)'},
bar:{color:color},
bgcolor:'rgba(255,255,255,0.05)',
borderwidth:1,bordercolor:'rgba(212,175,55,0.3)',
steps:[{range:[0,40],color:'rgba(255,69,58,0.1)'},{range:[40,70],color:'rgba(212,175,55,0.1)'},{range:[70,100],color:'rgba(48,209,88,0.1)'}]},
number:{font:{color:color,size:28}}
}],{margin:{l:20,r:20,t:0,b:0}});
});

// Shapley waterfall
plot('t4-shapley',[
{type:'waterfall',x:['基期GMV','流量效应','转化效应','客单效应','本期GMV'],
y:[GMV0/10000,trafficEffect/10000,convEffect/10000,priceEffect/10000,GMV1/10000],
measure:['absolute','relative','relative','relative','total'],
decreasing:{marker:{color:'#FF453A'}},
increasing:{marker:{color:'#30D158'}},
totals:{marker:{color:'rgba(212,175,55,0.6)'}},
connector:{line:{color:'rgba(255,255,255,0.2)'}},
textposition:'outside',texttemplate:'%{y:.1f}',textfont:{size:10}
}
],{yaxis:{title:{text:'GMV(万元)',font:{size:10}}}});

// Traffic health
const chVis=groupSalesByDim(sRows,'channel').map(([n,rs])=>[n,aggSales(rs).visitors]).sort((a,b)=>b[1]-a[1]);
plot('t4-traffic',[
{x:chVis.map(d=>d[1]),y:chVis.map(d=>d[0]),type:'bar',orientation:'h',marker:{color:COLORS[0]},text:chVis.map(d=>fmt(d[1],'num')),textposition:'outside',textfont:{size:9}}
],{margin:{l:60,r:60,t:10,b:30},yaxis:{autorange:'reversed'}});

// Product analysis
const mdlProfit=groupSalesByDim(sRows,'model').map(([n,rs])=>{const a=aggSales(rs);return{n,amt:a.amount,items:a.items,ap:a.buyers>0?a.amount/a.buyers:0}}).sort((a,b)=>b.amt-a.amt);
const top5=mdlProfit.slice(0,5),bot5=mdlProfit.slice(-5).reverse();
plot('t4-product',[
{x:top5.map(d=>d.n),y:top5.map(d=>d.amt/10000),type:'bar',name:'Top5',marker:{color:'rgba(48,209,88,0.6)'}},
{x:bot5.map(d=>d.n),y:bot5.map(d=>d.amt/10000),type:'bar',name:'Bottom5',marker:{color:'rgba(255,69,58,0.6)'}}
],{margin:{b:60},xaxis:{tickangle:-45,tickfont:{size:8}}});

// Channel efficiency
const pRows=getPromoRows(S.filters);
const chEff=groupPromoByDim(pRows,'channel').map(([n,rs])=>{const a=aggPromo(rs);const sA=aggSales(getSalesRows({...S.filters}).filter(r=>r[SC.ch]===D.meta.channels.indexOf(n)));return{n,cost:a.cost,roi:a.cost>0?a.totalAmount/a.cost:0,feeRate:sA.amount>0?a.cost/sA.amount*100:0}}).filter(d=>d.cost>0);
plot('t4-channel',[
{x:chEff.map(d=>d.roi),y:chEff.map(d=>d.n),type:'bar',orientation:'h',marker:{color:COLORS[1]},text:chEff.map(d=>d.roi.toFixed(1)),textposition:'outside',textfont:{size:9}}
],{margin:{l:60,r:40,t:10,b:30},yaxis:{autorange:'reversed'}});

// Action checklist
const actions=[];
const gmvYoY=chgPct(curr.amount,yoy.amount);
const gmvMoM=chgPct(curr.amount,mom.amount);
if(gmvYoY<0)actions.push({p:'P0',t:`GMV同比下降${Math.abs(gmvYoY).toFixed(1)}%，需紧急排查原因并制定增长方案`});
if(gmvMoM<0)actions.push({p:'P0',t:`GMV环比下降${Math.abs(gmvMoM).toFixed(1)}%，关注近期运营变化`});
if(curr.convRate<2)actions.push({p:'P0',t:`转化率仅${curr.convRate.toFixed(1)}%，低于行业基准(3%)，需优化详情页和价格策略`});
if(curr.roi<1&&curr.cost>0)actions.push({p:'P0',t:`ROI为${curr.roi.toFixed(2)}，推广投入产出比为负，建议暂停低效推广计划`});
if(curr.refundRate>5)actions.push({p:'P1',t:`退款率${curr.refundRate.toFixed(1)}%偏高，需检查产品质量和售后服务`});
if(curr.ctr<1&&curr.cost>0)actions.push({p:'P1',t:`点击率仅${curr.ctr.toFixed(1)}%，需优化推广素材和关键词`});

if(curr.feeRate>20)actions.push({p:'P2',t:`费率${curr.feeRate.toFixed(1)}%偏高，建议优化推广结构降低成本`});

function renderTab5Sales(){

let grouped;
if(dim==='date')grouped=groupSalesByDate(sRows,'day');
else if(dim==='month')grouped=groupSalesByDate(sRows,'month');
else grouped=groupSalesByDim(sRows,dim);

const data=grouped.map(([k,rs])=>{
const a=aggSales(rs);
return{
key:k,
amount:a.amount,items:a.items,buyers:a.buyers,visitors:a.visitors,
convRate:a.visitors>0?a.buyers/a.visitors*100:0,
avgPrice:a.buyers>0?a.amount/a.buyers:0,
addCartRate:a.visitors>0?a.addCart/a.visitors*100:0,

const topN=S.tab5.topN>0?Math.min(S.tab5.topN,data.length):data.length;
const showData=data.slice(0,topN);
const total=data.reduce((acc,d)=>{for(const k in acc)if(typeof acc[k]==='number')acc[k]+=d[k]||0;return acc},{amount:0,items:0,buyers:0,visitors:0,views:0,addCart:0,refund:0});
total.convRate=total.visitors>0?total.buyers/total.visitors*100:0;

document.getElementById('t5-sales-table').innerHTML=tableHTML(
[{text:dim==='date'?'日期':dim==='month'?'月份':dim==='channel'?'渠道':dim==='store'?'店铺':dim==='category'?'品类':'型号'},

{text:'支付金额(万)',align:'right'},{text:'访客数',align:'right'},{text:'转化率',align:'right'},{text:'客单价',align:'right'},{text:'加购率',align:'right'}],
rows
);
}

// ==================== TAB 6: 目标达成 ====================
function parseTargets(){
D.targetsParsed={};
for(const r of D.targets.rows){
const[month,store,model,indicator,value]=r;
if(!VALID_IND.has(indicator))continue;
if(!D.targetsParsed[month])D.targetsParsed[month]={};
if(!D.targetsParsed[month][store])D.targetsParsed[month][store]={};
if(!D.targetsParsed[month][store][model])D.targetsParsed[month][store][model]={};
D.targetsParsed[month][store][model][indicator]=value;
}
}
function renderTab6(){
const month='2026-07';
const tData=D.targetsParsed[month]||{};

// Aggregate by store
const storeAgg={};
for(const store in tData){
storeAgg[store]={成交金额目标:0,实际成交金额:0,支付件数目标:0,实际支付件数:0,目标费率:0,实际费率:0,推广花费:0,目标投入金额:0,实际推广花费:0};
for(const model in tData[store]){
const ind=tData[store][model];
for(const k in storeAgg[store]){
if(ind[k]!=null){
if(k==='目标费率'||k==='实际费率')storeAgg[store][k]+=ind[k];
else storeAgg[store][k]+=ind[k];
}
}
}
const cnt=Object.keys(tData[store]).length||1;
storeAgg[store]['目标费率']/=cnt;
storeAgg[store]['实际费率']/=cnt;
}

// Overall KPIs
let totAmtT=0,totAmtA=0,totItmT=0,totItmA=0,totCostT=0,totCostA=0;
for(const s in storeAgg){
totAmtT+=storeAgg[s]['成交金额目标']||0;
totAmtA+=storeAgg[s]['实际成交金额']||0;
totItmT+=storeAgg[s]['支付件数目标']||0;
totItmA+=storeAgg[s]['实际支付件数']||0;
totCostT+=storeAgg[s]['目标投入金额']||0;
totCostA+=storeAgg[s]['实际推广花费']||0;
}

let html=section('月度指标卡片',`<div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">
${kpiCard('成交金额达成率',fmt(totAmtT>0?totAmtA/totAmtT*100:0,'pct')+'%','',null,null)}
${kpiCard('支付件数达成率',fmt(totItmT>0?totItmA/totItmT*100:0,'pct')+'%','',null,null)}
${kpiCard('目标金额',fmt(totAmtT,'money'),'元',null,null)}
${kpiCard('实际金额',fmt(totAmtA,'money'),'元',null,null)}
</div>
<div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">
${kpiCard('目标投入',fmt(totCostT,'money'),'元',null,null)}
${kpiCard('实际推广花费',fmt(totCostA,'money'),'元',null,null)}
${kpiCard('目标费率',fmt(totAmtT>0?totCostT/totAmtT*100:0,'pct')+'%','',null,null)}
${kpiCard('实际费率',fmt(totAmtA>0?totCostA/totAmtA*100:0,'pct')+'%','',null,null)}
</div>`);

// Store target table
const storeRows=Object.entries(storeAgg).map(([s,d])=>{
const amtRate=d['成交金额目标']>0?d['实际成交金额']/d['成交金额目标']*100:0;
const itmRate=d['支付件数目标']>0?d['实际支付件数']/d['支付件数目标']*100:0;
return{store:s,...d,amtRate,itmRate};
}).sort((a,b)=>b.amtRate-a.amtRate);

html+=section('店铺目标达成',`<div class="table-wrap"><table class="data-table"><thead><tr>
<th>店铺</th><th>目标金额</th><th>实际金额</th><th>达成率</th><th>进度</th><th>目标件数</th><th>实际件数</th><th>件数达成率</th><th>目标费率</th><th>实际费率</th><th>推广花费</th>
</tr></thead><tbody>
${storeRows.map(r=>{
const barColor=r.amtRate>=100?'#30D158':r.amtRate>=60?'#D4AF37':'#FF453A';
return`<tr>
<td>${r.store}</td>
<td>${fmt(r['成交金额目标'],'money')}</td>
<td>${fmt(r['实际成交金额'],'money')}</td>
<td style="color:${barColor}">${r.amtRate.toFixed(1)}%</td>
<td><div class="prog-bar"><div class="prog-fill" style="width:${Math.min(r.amtRate,100)}%;background:${barColor}"></div></div></td>
<td>${fmt(r['支付件数目标'],'num')}</td>
<td>${fmt(r['实际支付件数'],'num')}</td>
<td style="color:${r.itmRate>=100?'#30D158':r.itmRate>=60?'#D4AF37':'#FF453A'}">${r.itmRate.toFixed(1)}%</td>
<td>${fmt(r['目标费率'],'pct')}%</td>
<td>${fmt(r['实际费率'],'pct')}%</td>
<td>${fmt(r['实际推广花费'],'money')}</td>
</tr>`;
}).join('')}
</tbody></table></div>`);

// Model target table (grouped by store)
html+=section('单品目标达成(按店铺分组)',`<div class="table-wrap" style="max-height:500px"><table class="data-table"><thead><tr>
<th>店铺</th><th>型号</th><th>目标金额</th><th>实际金额</th><th>达成率</th><th>目标件数</th><th>实际件数</th><th>件数达成率</th><th>推广花费</th>
</tr></thead><tbody>`);
for(const store in tData){
const models=Object.entries(tData[store]).map(([m,ind])=>{
const amtT=ind['成交金额目标']||0;
const amtA=ind['实际成交金额']||0;
const itmT=ind['支付件数目标']||0;
const itmA=ind['实际支付件数']||0;
const cost=ind['实际推广花费']||0;
const amtRate=amtT>0?amtA/amtT*100:0;
const itmRate=itmT>0?itmA/itmT*100:0;
return{m,amtT,amtA,itmT,itmA,cost,amtRate,itmRate};
}).sort((a,b)=>b.amtT-a.amtT);
for(const d of models){
html+=`<tr>
<td>${store}</td><td>${d.m}</td>
<td>${fmt(d.amtT,'money')}</td><td>${fmt(d.amtA,'money')}</td>
<td style="color:${d.amtRate>=100?'#30D158':d.amtRate>=60?'#D4AF37':'#FF453A'}">${d.amtRate.toFixed(1)}%</td>
<td>${fmt(d.itmT,'num')}</td><td>${fmt(d.itmA,'num')}</td>
<td style="color:${d.itmRate>=100?'#30D158':d.itmRate>=60?'#D4AF37':'#FF453A'}">${d.itmRate.toFixed(1)}%</td>
<td>${fmt(d.cost,'money')}</td>
</tr>`;
}
}
html+=`</tbody></table></div>`;
document.getElementById('tab6').innerHTML=html;
}
